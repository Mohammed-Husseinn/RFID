<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RFID Attendance Logger</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="top-bar">
      <div class="top-bar__content">
        <p class="project-title">PROJECT : RFID ATTENDANCE LOGGER</p>
        <button class="theme-toggle" type="button" aria-label="Toggle theme">
          <svg
            viewBox="0 0 24 24"
            aria-hidden="true"
            fill="none"
            stroke="currentColor"
            stroke-width="2.3"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <circle cx="12" cy="12" r="3.6" />
            <path d="M12 2.7v2.4M12 18.9v2.4M4.7 12h2.4M16.9 12h2.4M6.8 6.8l1.7 1.7M15.5 15.5l1.7 1.7M17.2 6.8l-1.7 1.7M8.5 15.5l-1.7 1.7" />
          </svg>
        </button>
      </div>
    </header>

    <main class="page-shell">
      <section class="panel" aria-labelledby="attendance-heading">
        <h1 id="attendance-heading">Live Attendance (Active Students)</h1>

        <div class="controls-row">
          <label class="search" for="student-search">
            <svg class="search__icon" viewBox="0 0 24 24" aria-hidden="true">
              <path
                d="M10.5 3.5a7 7 0 0 1 5.56 11.25l4.1 4.1a1 1 0 0 1-1.42 1.42l-4.1-4.1A7 7 0 1 1 10.5 3.5Zm0 2a5 5 0 1 0 0 10 5 5 0 0 0 0-10Z"
              />
            </svg>
            <input
              id="student-search"
              type="search"
              placeholder="Search for Student"
              autocomplete="off"
            />
          </label>

          <button id="refresh-btn" class="refresh-btn" type="button">
            <svg
              viewBox="0 0 24 24"
              aria-hidden="true"
              fill="none"
              stroke="currentColor"
              stroke-width="2.4"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M21 12a9 9 0 0 1-15.3 6.3" />
              <path d="M6 21v-5h5" />
              <path d="M3 12a9 9 0 0 1 15.3-6.3" />
              <path d="M18 3v5h-5" />
            </svg>
            <span>Refresh</span>
          </button>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th scope="col">ID</th>
                <th scope="col">NAME</th>
                <th scope="col">ENTRY TIME</th>
                <th scope="col">STATUES</th>
              </tr>
            </thead>
            <tbody id="attendance-body"></tbody>
          </table>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
